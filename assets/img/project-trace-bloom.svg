    <path d="M145 360 C230 250, 320 360, 400 235 S570 160, 660 270" stroke="#5ff5ff" stroke-width="4" stroke-linecap="round"/>
    <path d="M160 373 C245 255, 320 372, 405 245 S580 172, 675 282" stroke="#ff4fd8" stroke-width="2" opacity=".7"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="145" cy="360" r="42" fill="rgba(95,245,255,.14)" stroke="#5ff5ff" stroke-width="5"/>
    <circle cx="400" cy="235" r="48" fill="rgba(95,245,255,.14)" stroke="#5ff5ff" stroke-width="5"/>
    <circle cx="660" cy="270" r="42" fill="rgba(118,255,180,.14)" stroke="#76ffb4" stroke-width="5"/>
    <circle cx="292" cy="165" r="28" fill="rgba(255,68,94,.18)" stroke="#ff445e" stroke-width="5"/>
    <path d="M292 122l16 34 38 6-28 26 7 38-33-18-34 18 7-38-28-26 38-6z" fill="rgba(255,68,94,.22)" stroke="#ff445e" stroke-width="3"/>
    <circle cx="530" cy="350" r="25" fill="rgba(255,68,94,.18)" stroke="#ff445e" stroke-width="4"/>
    <path d="M520 332l24 18-26 17" stroke="#ff445e" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
